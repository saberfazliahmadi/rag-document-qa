name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # CPU-only torch keeps the install several gigabytes smaller than the
      # default CUDA build — CI machines have no GPU anyway.
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: pytest -q

      # Deterministic retrieval metrics over the golden dataset. Fails the
      # build if a change degrades retrieval quality below the thresholds.
      - name: Retrieval regression gate
        run: python -m eval.run --check
